<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>源纪元 · 岸线侵入 — 海报生成器</title>
<style>
  :root {
    --bg: #03060d;
    --panel: #0a0f1a;
    --border: #1a2540;
    --text: #c8d6e5;
    --accent: #c0392b;
    --accent2: #2980b9;
    --gold: #d4a843;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 20px 30px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 1.6rem;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(192,57,43,0.4);
  }
  header p { margin-top: 4px; font-size: 0.8rem; color: #5a6a88; }

  .layout {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    padding: 20px;
    max-width: 1400px;
    width: 100%;
    justify-content: center;
  }

  /* ── 画布容器 ── */
  .canvas-wrap {
    background: #000;
    border: 2px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(192,57,43,0.15);
    flex-shrink: 0;
  }
  canvas { display: block; max-width: 800px; width: 100%; height: auto; }

  /* ── 控制面板 ── */
  .controls {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    width: 360px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .controls h3 {
    font-size: 0.95rem;
    letter-spacing: 2px;
    color: var(--accent2);
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }

  label {
    display: block;
    font-size: 0.78rem;
    color: #7a8aa8;
    margin-bottom: 4px;
    letter-spacing: 1px;
  }
  input[type="text"],
  input[type="number"],
  select,
  textarea {
    width: 100%;
    background: #0d1220;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 4px;
    font-size: 0.85rem;
    font-family: inherit;
  }
  textarea { resize: vertical; min-height: 50px; }
  select { cursor: pointer; }
  input[type="range"] { width: 100%; accent-color: var(--accent); }

  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }

  .preset-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .preset-grid button {
    padding: 8px 4px;
    font-size: 0.72rem;
    background: #0d1220;
    border: 1px solid var(--border);
    color: #7a8aa8;
    border-radius: 4px;
    cursor: pointer;
    transition: 0.2s;
  }
  .preset-grid button:hover,
  .preset-grid button.active {
    border-color: var(--accent);
    color: var(--accent);
    text-shadow: 0 0 8px rgba(192,57,43,0.6);
  }

  button {
    padding: 10px 16px;
    font-size: 0.85rem;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: 0.2s;
    font-weight: 600;
  }
  .btn-redraw {
    background: #1a2a40;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-redraw:hover { border-color: var(--accent2); }
  .btn-export {
    background: var(--accent);
    color: #fff;
    width: 100%;
    font-size: 1rem;
    padding: 12px;
  }
  .btn-export:hover { background: #e74c3c; box-shadow: 0 0 20px rgba(192,57,43,0.4); }

  .info-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    color: #4a5a78;
  }
  .info-row span { color: var(--accent2); }
</style>
</head>
<body>

<header>
  <h1>源纪元 · 岸线侵入</h1>
  <p>海报生成器 &nbsp;|&nbsp; 16:9 &nbsp;|&nbsp; 导出 ≤ 5MB</p>
</header>

<div class="layout">
  <!-- 画布 -->
  <div class="canvas-wrap">
    <canvas id="poster" width="1920" height="1080"></canvas>
  </div>

  <!-- 控制面板 -->
  <div class="controls">
    <h3>🎨 预设风格</h3>
    <div class="preset-grid" id="presets">
      <button data-preset="crimson" class="active">赤潮降临</button>
      <button data-preset="abyss">深海意志</button>
      <button data-preset="neural">神经网络</button>
      <button data-preset="ruins">废墟黎明</button>
      <button data-preset="eclipse">日蚀纪元</button>
      <button data-preset="purge">净空之剑</button>
    </div>

    <h3>📝 文字内容</h3>
    <label>主标题</label>
    <input type="text" id="titleCn" value="源纪元 · 岸线侵入" maxlength="40">
    <label>副标题</label>
    <input type="text" id="titleEn" value="SOURCE EPOCH INCURSION" maxlength="60">
    <label>标语</label>
    <input type="text" id="tagline" value="当你凝视深渊时，深渊正以你的记忆为食" maxlength="50">

    <h3>🎚 视觉效果</h3>
    <div class="row">
      <div>
        <label>扫描线强度</label>
        <input type="range" id="scanlines" min="0" max="100" value="35">
      </div>
      <div>
        <label>噪点强度</label>
        <input type="range" id="noise" min="0" max="100" value="18">
      </div>
    </div>
    <div class="row">
      <div>
        <label>光晕强度</label>
        <input type="range" id="glow" min="0" max="100" value="60">
      </div>
      <div>
        <label>暗角</label>
        <input type="range" id="vignette" min="0" max="100" value="55">
      </div>
    </div>

    <h3>🗺 丝印信息</h3>
    <label>左下角标注</label>
    <input type="text" id="footer" value="AI-Driven Narrative RPG · 2125 AD · 曙光议会机密档案" maxlength="60">
    <label>版本标识</label>
    <input type="text" id="version" value="v1.0 — BORDER BASE ALPHA" maxlength="30">

    <button class="btn-redraw" id="btnRedraw">🔄 刷新预览</button>
    <button class="btn-export" id="btnExport">📥 导出海报 PNG</button>
    <div class="info-row">
      <span>分辨率</span> <span id="infoRes">1920×1080</span>
    </div>
    <div class="info-row">
      <span>预估大小</span> <span id="infoSize">—</span>
    </div>
  </div>
</div>

<script>
// ─────────────────── 海报渲染引擎 ───────────────────
const canvas = document.getElementById('poster');
const ctx = canvas.getContext('2d');
const W = canvas.width;   // 1920
const H = canvas.height;  // 1080

// ── 预设定义 ──
const PRESETS = {
  crimson: {
    bg1: '#020408', bg2: '#1a0a08', bg3: '#2d0f0c',
    accent1: '#c0392b', accent2: '#e74c3c', accent3: '#ff6b4a',
    hexColor: 'rgba(192,57,43,0.12)',
    gridColor: 'rgba(192,57,43,0.06)',
    lineGlow: 'rgba(192,57,43,0.25)',
    titleGlow: 'rgba(192,57,43,0.6)',
    secondary: '#4a90d9',
    structureColor: 'rgba(192,57,43,0.18)',
    scanColor: 'rgba(255,60,30,0.04)',
  },
  abyss: {
    bg1: '#010308', bg2: '#020d18', bg3: '#051525',
    accent1: '#1a5276', accent2: '#2980b9', accent3: '#5dade2',
    hexColor: 'rgba(41,128,185,0.10)',
    gridColor: 'rgba(41,128,185,0.05)',
    lineGlow: 'rgba(41,128,185,0.20)',
    titleGlow: 'rgba(41,128,185,0.5)',
    secondary: '#7d3c98',
    structureColor: 'rgba(41,128,185,0.15)',
    scanColor: 'rgba(30,144,255,0.03)',
  },
  neural: {
    bg1: '#010410', bg2: '#0a0a1e', bg3: '#111140',
    accent1: '#6c3483', accent2: '#a569bd', accent3: '#d2b4de',
    hexColor: 'rgba(165,105,189,0.10)',
    gridColor: 'rgba(165,105,189,0.04)',
    lineGlow: 'rgba(165,105,189,0.20)',
    titleGlow: 'rgba(165,105,189,0.5)',
    secondary: '#2ecc71',
    structureColor: 'rgba(165,105,189,0.12)',
    scanColor: 'rgba(140,80,200,0.03)',
  },
  ruins: {
    bg1: '#050505', bg2: '#12100a', bg3: '#1e1a12',
    accent1: '#d4a843', accent2: '#f0c060', accent3: '#fad7a0',
    hexColor: 'rgba(212,168,67,0.10)',
    gridColor: 'rgba(212,168,67,0.05)',
    lineGlow: 'rgba(212,168,67,0.18)',
    titleGlow: 'rgba(212,168,67,0.5)',
    secondary: '#c0392b',
    structureColor: 'rgba(212,168,67,0.12)',
    scanColor: 'rgba(200,160,60,0.03)',
  },
  eclipse: {
    bg1: '#020202', bg2: '#0a0606', bg3: '#140a0a',
    accent1: '#922b21', accent2: '#c0392b', accent3: '#e6b0aa',
    hexColor: 'rgba(192,57,43,0.08)',
    gridColor: 'rgba(146,43,33,0.05)',
    lineGlow: 'rgba(192,57,43,0.30)',
    titleGlow: 'rgba(192,57,43,0.7)',
    secondary: '#717d7e',
    structureColor: 'rgba(192,57,43,0.20)',
    scanColor: 'rgba(180,40,20,0.04)',
  },
  purge: {
    bg1: '#020608', bg2: '#0a0f12', bg3: '#0f1a1e',
    accent1: '#2e86c1', accent2: '#85c1e9', accent3: '#d6eaf8',
    hexColor: 'rgba(46,134,193,0.10)',
    gridColor: 'rgba(46,134,193,0.05)',
    lineGlow: 'rgba(46,134,193,0.22)',
    titleGlow: 'rgba(46,134,193,0.55)',
    secondary: '#f39c12',
    structureColor: 'rgba(46,134,193,0.14)',
    scanColor: 'rgba(60,150,210,0.03)',
  },
};

let currentPreset = 'crimson';
let p = PRESETS[currentPreset];

// ── 随机数发生器(可控) ──
class SeededRandom {
  constructor(seed = 42) { this.seed = seed; }
  next() {
    this.seed = (this.seed * 16807) % 2147483647;
    return (this.seed - 1) / 2147483646;
  }
}

// ── 绘制渐变背景 ──
function drawBackground(rng) {
  // 垂直渐变
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, p.bg1);
  grad.addColorStop(0.45, p.bg2);
  grad.addColorStop(0.75, p.bg3);
  grad.addColorStop(1, p.bg1);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // 大型光斑: 右侧辉光(源的方向)
  const glowX = W * 0.78 + rng.next() * 100;
  const glowY = H * 0.45;
  const glowGrad = ctx.createRadialGradient(glowX, glowY, 50, glowX, glowY, 600);
  glowGrad.addColorStop(0, p.accent1 + '33');
  glowGrad.addColorStop(0.4, p.accent1 + '11');
  glowGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(0, 0, W, H);

  // 底部光斑(岸线)
  const shoreGrad = ctx.createLinearGradient(0, H * 0.72, 0, H);
  shoreGrad.addColorStop(0, 'transparent');
  shoreGrad.addColorStop(0.5, p.accent1 + '0a');
  shoreGrad.addColorStop(1, p.accent1 + '18');
  ctx.fillStyle = shoreGrad;
  ctx.fillRect(0, H * 0.72, W, H * 0.28);
}

// ── 绘制六边形网格 ──
function drawHexGrid() {
  ctx.save();
  ctx.globalAlpha = 0.5;
  ctx.strokeStyle = p.hexColor;
  ctx.lineWidth = 0.5;
  const size = 38;
  const w = size * 2;
  const h = Math.sqrt(3) * size;
  for (let row = -2; row < H / h + 2; row++) {
    for (let col = -2; col < W / (w * 0.75) + 2; col++) {
      const cx = col * w * 0.75;
      const cy = row * h + (col % 2 === 0 ? 0 : h / 2);
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const angle = (Math.PI / 3) * i - Math.PI / 6;
        const x = cx + size * Math.cos(angle);
        const y = cy + size * Math.sin(angle);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.stroke();
    }
  }
  ctx.restore();
}

// ── 数据结构线条 ──
function drawDataLines(rng) {
  ctx.save();
  // 水平数据线
  for (let i = 0; i < 18; i++) {
    const y = H * 0.3 + i * 38 + rng.next() * 12;
    const x1 = W * 0.02;
    const x2 = W * 0.25 + rng.next() * 600;
    const alpha = 0.03 + rng.next() * 0.06;
    ctx.strokeStyle = p.accent2 + Math.floor(alpha * 255).toString(16).padStart(2, '0');
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x1, y);
    // 添加微小的抖动
    for (let x = x1; x < x2; x += 40) {
      ctx.lineTo(x, y + (rng.next() - 0.5) * 4);
    }
    ctx.stroke();
  }

  // 垂直线(左区域)
  for (let i = 0; i < 10; i++) {
    const x = W * 0.05 + i * 55 + rng.next() * 20;
    ctx.strokeStyle = p.accent2 + '10';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, H * 0.25);
    ctx.lineTo(x, H * 0.68 + rng.next() * 200);
    ctx.stroke();
  }
  ctx.restore();
}

// ── 绘制岸线/建筑轮廓 ──
function drawStructures(rng) {
  ctx.save();
  ctx.fillStyle = p.structureColor;
  ctx.strokeStyle = p.lineGlow;
  ctx.lineWidth = 1.2;

  // 底部建筑群剪影
  const buildings = [];
  let bx = W * 0.05;
  const baseY = H * 0.78;
  while (bx < W * 0.92) {
    const w = 18 + rng.next() * 80;
    const h = 40 + rng.next() * 160;
    buildings.push({ x: bx, y: baseY - h, w, h });
    bx += w + rng.next() * 30;
  }

  for (const b of buildings) {
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.strokeRect(b.x, b.y, b.w, b.h);
  }

  // 中心大型结构(指挥塔)
  const towerX = W * 0.25;
  const towerBaseY = baseY;
  const towerH = 280;
  const towerW = 90;
  ctx.fillStyle = p.structureColor;
  ctx.fillRect(towerX - towerW/2, towerBaseY - towerH, towerW, towerH);
  ctx.strokeStyle = p.lineGlow;
  ctx.lineWidth = 2;
  ctx.strokeRect(towerX - towerW/2, towerBaseY - towerH, towerW, towerH);

  // 通讯天线
  ctx.beginPath();
  ctx.moveTo(towerX, towerBaseY - towerH);
  ctx.lineTo(towerX, towerBaseY - towerH - 140);
  ctx.stroke();
  // 天线分支
  for (let i = 0; i < 3; i++) {
    const ay = towerBaseY - towerH - 30 - i * 45;
    ctx.beginPath();
    ctx.moveTo(towerX, ay);
    ctx.lineTo(towerX - 35 + i * 15, ay - 18);
    ctx.moveTo(towerX, ay);
    ctx.lineTo(towerX + 35 - i * 15, ay - 18);
    ctx.stroke();
  }

  // 右侧远处的大型结构
  const rstructs = [
    { x: W * 0.65, y: baseY - 220, w: 70, h: 220 },
    { x: W * 0.72, y: baseY - 170, w: 55, h: 170 },
    { x: W * 0.78, y: baseY - 300, w: 100, h: 300 },
    { x: W * 0.88, y: baseY - 130, w: 45, h: 130 },
  ];
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.strokeStyle = p.lineGlow;
  ctx.lineWidth = 1.5;
  for (const s of rstructs) {
    ctx.fillRect(s.x - s.w/2, s.y, s.w, s.h);
    ctx.strokeRect(s.x - s.w/2, s.y, s.w, s.h);
  }

  ctx.restore();
}

// ── 绘制大型圆形(星球/光晕) ──
function drawCelestial(rng) {
  ctx.save();
  // 右侧大型圆形
  const cx = W * 0.78;
  const cy = H * 0.42;
  const outerR = 340;

  // 外光晕
  const outerGlow = ctx.createRadialGradient(cx, cy, outerR * 0.55, cx, cy, outerR);
  outerGlow.addColorStop(0, p.accent1 + '15');
  outerGlow.addColorStop(0.5, p.accent1 + '06');
  outerGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = outerGlow;
  ctx.beginPath();
  ctx.arc(cx, cy, outerR, 0, Math.PI * 2);
  ctx.fill();

  // 主线圆
  ctx.strokeStyle = p.accent1 + '30';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(cx, cy, outerR * 0.62, 0, Math.PI * 2);
  ctx.stroke();

  // 内圆
  ctx.strokeStyle = p.accent2 + '20';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(cx, cy, outerR * 0.35, 0, Math.PI * 2);
  ctx.stroke();

  // 从圆心发出的射线
  for (let i = 0; i < 24; i++) {
    const angle = (Math.PI * 2 / 24) * i + rng.next() * 0.15;
    const len = outerR * (0.28 + rng.next() * 0.5);
    const r1 = outerR * 0.25;
    ctx.strokeStyle = p.accent2 + '0c';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(angle) * r1, cy + Math.sin(angle) * r1);
    ctx.lineTo(cx + Math.cos(angle) * len, cy + Math.sin(angle) * len);
    ctx.stroke();
  }

  // 轨道环
  ctx.strokeStyle = p.accent1 + '18';
  ctx.lineWidth = 0.8;
  ctx.setLineDash([4, 20]);
  ctx.beginPath();
  ctx.arc(cx, cy, outerR * 0.78, -0.3, Math.PI * 1.5);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.restore();
}

// ── 绘制粒子 ──
function drawParticles(rng) {
  ctx.save();
  const count = 260;
  for (let i = 0; i < count; i++) {
    const px = rng.next() * W;
    const py = rng.next() * H;
    const radius = 0.5 + rng.next() * 1.8;
    const alpha = 0.15 + rng.next() * 0.5;
    ctx.fillStyle = p.accent3 + Math.floor(alpha * 255).toString(16).padStart(2, '0');
    ctx.beginPath();
    ctx.arc(px, py, radius, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// ── 绘制文字 ──
function drawText() {
  const titleCn = document.getElementById('titleCn').value || '源纪元 · 岸线侵入';
  const titleEn = document.getElementById('titleEn').value || 'SOURCE EPOCH INCURSION';
  const tagline = document.getElementById('tagline').value || '';
  const footer = document.getElementById('footer').value || '';
  const version = document.getElementById('version').value || '';

  ctx.save();

  // ── 主标题 ──
  ctx.textAlign = 'left';
  ctx.fillStyle = '#e8e8e8';

  // 光晕
  ctx.shadowColor = p.titleGlow;
  ctx.shadowBlur = 30;
  ctx.font = 'bold 76px "Microsoft YaHei", "Source Han Sans SC", "Noto Sans SC", sans-serif';
  ctx.fillText(titleCn, 80, 220);

  // 再次描画(无模糊)让文字更清晰
  ctx.shadowBlur = 0;
  ctx.fillText(titleCn, 80, 220);

  // 装饰线
  const titleWidth = ctx.measureText(titleCn).width;
  ctx.strokeStyle = p.accent2 + '60';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(80, 248);
  ctx.lineTo(80 + titleWidth + 20, 248);
  ctx.stroke();

  // ── 副标题 ──
  ctx.fillStyle = p.accent3 + 'aa';
  ctx.shadowColor = p.accent1 + '40';
  ctx.shadowBlur = 10;
  ctx.font = '28px "Segoe UI", "Microsoft YaHei", sans-serif';
  ctx.letterSpacing = '8px';
  ctx.fillText(titleEn, 84, 296);
  ctx.shadowBlur = 0;
  ctx.fillText(titleEn, 84, 296);

  // ── 标语 ──
  if (tagline) {
    ctx.fillStyle = '#6a7a98';
    ctx.shadowBlur = 0;
    ctx.font = '21px "Microsoft YaHei", sans-serif';
    ctx.fillText(tagline, 84, 350);
  }

  // ── 左下角信息 ──
  if (footer) {
    ctx.fillStyle = '#3a4a68';
    ctx.font = '16px "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(footer, 80, H - 60);
  }
  if (version) {
    ctx.fillStyle = '#3a4a68';
    ctx.font = '14px "Segoe UI", monospace';
    ctx.fillText(version, 80, H - 36);
  }

  // ── 右上角装饰文字 ──
  ctx.textAlign = 'right';
  ctx.fillStyle = p.accent2 + '30';
  ctx.font = '12px monospace';
  ctx.fillText('CLASSIFIED // 曙光议会', W - 80, 60);
  ctx.fillText('BORDER BASE · SECTOR 7', W - 80, 82);

  // ── 右侧竖排文字 ──
  ctx.fillStyle = p.accent1 + '18';
  ctx.font = 'bold 48px "Microsoft YaHei", serif';
  ctx.textAlign = 'right';
  const verticalY = H * 0.36;
  const verticalX = W - 120;
  const chars = '岸线侵入';
  for (let i = 0; i < chars.length; i++) {
    ctx.fillText(chars[i], verticalX, verticalY + i * 60);
  }

  ctx.restore();
}

// ── 扫描线 ──
function drawScanlines() {
  const intensity = parseInt(document.getElementById('scanlines').value) / 100;
  if (intensity <= 0) return;
  ctx.save();
  ctx.globalAlpha = intensity;
  for (let y = 0; y < H; y += 3) {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, y, W, 1);
  }
  ctx.restore();
}

// ── 噪点 ──
function drawNoise(rng) {
  const intensity = parseInt(document.getElementById('noise').value) / 100;
  if (intensity <= 0) return;
  ctx.save();
  const imageData = ctx.getImageData(0, 0, W, H);
  const data = imageData.data;
  const grain = Math.floor(intensity * 50);
  for (let i = 0; i < data.length; i += 4) {
    if (rng.next() < intensity * 0.3) {
      const noise = (rng.next() - 0.5) * grain;
      data[i] = Math.min(255, Math.max(0, data[i] + noise));
      data[i + 1] = Math.min(255, Math.max(0, data[i + 1] + noise));
      data[i + 2] = Math.min(255, Math.max(0, data[i + 2] + noise));
    }
  }
  ctx.putImageData(imageData, 0, 0);
  ctx.restore();
}

// ── 暗角 ──
function drawVignette() {
  const intensity = parseInt(document.getElementById('vignette').value) / 100;
  if (intensity <= 0) return;
  ctx.save();
  const grad = ctx.createRadialGradient(W/2, H/2, W * 0.35, W/2, H/2, W * 0.72);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(1, `rgba(0,0,0,${intensity * 0.8})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

// ── 边框 ──
function drawBorder() {
  ctx.save();
  const m = 14;
  ctx.strokeStyle = p.accent2 + '22';
  ctx.lineWidth = 1;
  ctx.strokeRect(m, m, W - m * 2, H - m * 2);
  // 角标
  const cornerLen = 40;
  ctx.strokeStyle = p.accent1 + '40';
  ctx.lineWidth = 2;
  [
    [m, m, 1, 1], [W-m, m, -1, 1],
    [m, H-m, 1, -1], [W-m, H-m, -1, -1]
  ].forEach(([cx, cy, dx, dy]) => {
    ctx.beginPath();
    ctx.moveTo(cx, cy + dy * cornerLen);
    ctx.lineTo(cx, cy);
    ctx.lineTo(cx + dx * cornerLen, cy);
    ctx.stroke();
  });
  ctx.restore();
}

// ── 主渲染 ──
function render() {
  p = PRESETS[currentPreset];
  const rng = new SeededRandom(Date.now() % 100000);

  ctx.clearRect(0, 0, W, H);

  drawBackground(rng);
  drawCelestial(rng);
  drawHexGrid();
  drawDataLines(rng);
  drawStructures(rng);
  drawParticles(rng);
  drawText();
  drawBorder();
  drawScanlines();
  drawNoise(rng);
  drawVignette();
}

// ── 导出 ──
function exportPNG() {
  // 重新渲染以更新canvas内容
  p = PRESETS[currentPreset];
  const rng = new SeededRandom(Date.now() % 100000);
  ctx.clearRect(0, 0, W, H);
  drawBackground(rng);
  drawCelestial(rng);
  drawHexGrid();
  drawDataLines(rng);
  drawStructures(rng);
  drawParticles(rng);
  drawText();
  drawBorder();
  drawScanlines();
  drawNoise(rng);
  drawVignette();

  // 尝试不同质量直到 ≤ 5MB
  const qualities = [0.92, 0.85, 0.78, 0.70, 0.62, 0.55];
  for (const q of qualities) {
    const dataUrl = canvas.toDataURL('image/png');
    const blob = dataURLtoBlob(dataUrl);
    if (blob.size <= 5 * 1024 * 1024) {
      downloadBlob(blob, `poster_${currentPreset}.png`);
      updateSizeInfo();
      return;
    }
  }

  // 极限压缩
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = 1600;
  tempCanvas.height = 900;
  const tctx = tempCanvas.getContext('2d');
  tctx.drawImage(canvas, 0, 0, 1600, 900);
  const dataUrl = tempCanvas.toDataURL('image/png');
  const blob = dataURLtoBlob(dataUrl);
  downloadBlob(blob, `poster_${currentPreset}.png`);
  updateSizeInfo();
}

function dataURLtoBlob(dataUrl) {
  const parts = dataUrl.split(',');
  const mime = parts[0].match(/:(.*?);/)[1];
  const bytes = atob(parts[1]);
  const arr = new Uint8Array(bytes.length);
  for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function updateSizeInfo() {
  const dataUrl = canvas.toDataURL('image/png');
  const blob = dataURLtoBlob(dataUrl);
  const kb = (blob.size / 1024).toFixed(0);
  const mb = (blob.size / (1024 * 1024)).toFixed(2);
  document.getElementById('infoSize').textContent =
    kb < 1024 ? `${kb} KB` : `${mb} MB`;
  document.getElementById('infoRes').textContent = `${W}×${H}`;
}

// ── 事件绑定 ──
document.getElementById('btnRedraw').addEventListener('click', () => {
  render();
  updateSizeInfo();
});

document.getElementById('btnExport').addEventListener('click', exportPNG);

// 预设按钮
document.querySelectorAll('#presets button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#presets button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentPreset = btn.dataset.preset;
    render();
    updateSizeInfo();
  });
});

// 滑块实时更新
['scanlines', 'noise', 'glow', 'vignette'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    render();
    updateSizeInfo();
  });
});

// 文字输入更新
['titleCn', 'titleEn', 'tagline', 'footer', 'version'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    render();
    updateSizeInfo();
  });
});

// ── 初始化 ──
render();
updateSizeInfo();
</script>
</body>
</html>
